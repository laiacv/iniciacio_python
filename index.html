<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent G: Missió Vil·la Enigmàtica</title>
    <style>
        :root {
            --col-fondo: #ADC1B8;
            --col-porta: #7C4740;
            --col-marc: #282828;
            --col-boto: #EFBC70;
            --col-quadre: #566E75;
            --col-inv: #1E1E1E;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #game-container {
            width: 800px;
            height: 600px;
            background-color: var(--col-fondo);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        .scene {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }

        .scene.active { display: block; }

        /* Terra */
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background-color: #96AAA0;
        }

        /* --- ESCENA FRONTAL --- */
        .door-frame {
            position: absolute;
            left: 300px;
            top: 100px;
            width: 200px;
            height: 350px;
            background-color: var(--col-marc);
        }

        .door {
            position: absolute;
            left: 10px;
            top: 10px;
            width: 180px;
            height: 340px;
            background-color: var(--col-porta);
            transition: transform 0.5s ease-in-out;
            cursor: pointer;
        }

        .door.open {
            transform: skewY(-10deg) scaleX(0.1);
            background-color: #111;
        }

        .door-knob {
            position: absolute;
            right: 20px;
            top: 170px;
            width: 16px;
            height: 16px;
            background-color: var(--col-boto);
            border-radius: 50%;
        }

        .doorbell-panel {
            position: absolute;
            left: 510px;
            top: 250px;
            width: 20px;
            height: 40px;
            background-color: var(--col-marc);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .doorbell-button {
            width: 10px;
            height: 10px;
            background-color: var(--col-boto);
            border-radius: 50%;
        }

        .painting {
            position: absolute;
            left: 100px;
            top: 150px;
            width: 120px;
            height: 150px;
            background-color: var(--col-marc);
            padding: 5px;
            transition: left 0.3s ease;
            cursor: pointer;
            z-index: 2;
        }

        .painting-art {
            width: 100%;
            height: 100%;
            background-color: var(--col-quadre);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .painting-circle {
            width: 60px;
            height: 60px;
            background-color: var(--col-boto);
            border-radius: 50%;
        }

        .painting.moved { left: 40px; }

        .secret-compartment {
            position: absolute;
            left: 110px;
            top: 190px;
            width: 40px;
            height: 40px;
            background-color: #323232;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .key {
            width: 25px;
            height: 15px;
            background-color: gold;
            position: relative;
        }

        /* --- ESCENA LATERAL (NOVA!) --- */
        .window {
            position: absolute;
            left: 250px;
            top: 150px;
            width: 300px;
            height: 200px;
            background-color: #222;
            border: 10px solid var(--col-marc);
        }

        .clue-text {
            color: #444;
            font-size: 12px;
            position: absolute;
            bottom: 160px;
            left: 380px;
        }

        /* --- NAVEGACIÓ (GIRAR) --- */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background-color: rgba(0,0,0,0.3);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
        }

        .nav-arrow:hover { background-color: rgba(0,0,0,0.6); }
        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }

        /* --- INTERFÍCIE I INVENTARI --- */
        #ui-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background-color: var(--col-inv);
            border-top: 4px solid var(--col-marc);
            color: white;
            display: grid;
            grid-template-columns: 2fr 1fr;
            z-index: 20;
        }

        #message-box {
            padding: 20px;
            display: flex;
            align-items: center;
            font-size: 18px;
            line-height: 1.4;
            border-right: 2px solid #444;
        }

        #inventory-box {
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #inventory-box h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
        }

        .inventory-slot {
            width: 60px;
            height: 50px;
            background-color: #333;
            border: 2px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .inv-key {
            width: 30px;
            height: 15px;
            background-color: gold;
            display: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="floor"></div>
    
    <!-- Fletxes de Navegació -->
    <div class="nav-arrow arrow-left" onclick="rotateScene(-1)">&#8249;</div>
    <div class="nav-arrow arrow-right" onclick="rotateScene(1)">&#8250;</div>

    <!-- Escena 1: La Porta Principal -->
    <div id="scene-front" class="scene active">
        <div class="door-frame">
            <div id="main-door" class="door" onclick="interactDoor()">
                <div class="door-knob"></div>
            </div>
        </div>
        <div class="doorbell-panel" onclick="ringBell()">
            <div class="doorbell-button"></div>
        </div>
        <div id="painting" class="painting" onclick="movePainting()">
            <div class="painting-art">
                <div class="painting-circle"></div>
            </div>
        </div>
        <div id="compartment" class="secret-compartment hidden" onclick="takeKey()">
            <div class="key"></div>
        </div>
    </div>

    <!-- Escena 2: El Lateral (Pista) -->
    <div id="scene-side" class="scene">
        <div class="window"></div>
        <div class="clue-text">"La clau es troba on l'art s'amaga."</div>
        <div style="position: absolute; left: 100px; bottom: 150px; width: 40px; height: 100px; background: var(--col-marc);"></div>
    </div>

    <!-- Panell Inferior (Missatges + Inventari) -->
    <div id="ui-panel">
        <div id="message-box">
            <span id="message">Agent G, troba la manera d'entrar a la vil·la de Ruby La Rouge.</span>
        </div>
        <div id="inventory-box">
            <h3>Inventari</h3>
            <div class="inventory-slot">
                <div id="inv-key-icon" class="inv-key"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let hasKey = false;
    let paintingMoved = false;
    let doorOpen = false;
    let currentScene = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, duration, volume = 0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function rotateScene(dir) {
        playSound(1000, 'sine', 0.05, 0.02);
        currentScene = (currentScene + dir + 2) % 2;
        document.getElementById('scene-front').classList.toggle('active', currentScene === 0);
        document.getElementById('scene-side').classList.toggle('active', currentScene === 1);
        
        if (currentScene === 1) {
            updateMessage("Has girat al lateral de la vil·la. Què és això a la paret?");
        } else {
            updateMessage("Tornes a ser davant la porta principal.");
        }
    }

    function ringBell() {
        if (doorOpen) return;
        playSound(523.25, 'sine', 1.0, 0.2);
        setTimeout(() => playSound(415.30, 'sine', 1.0, 0.2), 300);
        updateMessage("Ding-Dong! Ningú respon...");
    }

    function movePainting() {
        if (doorOpen) return;
        playSound(800, 'square', 0.05, 0.05);
        paintingMoved = !paintingMoved;
        const p = document.getElementById('painting');
        const c = document.getElementById('compartment');
        if (paintingMoved) {
            p.classList.add('moved');
            if (!hasKey) c.classList.remove('hidden');
            updateMessage("Has mogut el quadre. Hi ha un amagatall!");
        } else {
            p.classList.remove('moved');
            c.classList.add('hidden');
            updateMessage("Un quadre d'estil retro.");
        }
    }

    function takeKey() {
        playSound(600, 'triangle', 0.1, 0.1);
        hasKey = true;
        document.getElementById('compartment').classList.add('hidden');
        document.getElementById('inv-key-icon').style.display = 'block';
        updateMessage("Has agafat la clau daurada!");
    }

    function interactDoor() {
        if (doorOpen) return;
        if (hasKey) {
            playSound(150, 'sawtooth', 0.5, 0.1);
            doorOpen = true;
            document.getElementById('main-door').classList.add('open');
            updateMessage("MISSIÓ COMPLETADA! Has entrat a la vil·la.");
        } else {
            playSound(400, 'square', 0.05, 0.05);
            updateMessage("Està tancada. Necessites la clau.");
        }
    }

    function updateMessage(msg) {
        document.getElementById('message').innerText = msg;
    }
</script>

</body>
</html>
